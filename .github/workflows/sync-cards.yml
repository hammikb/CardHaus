name: Sync Cards Nightly
on:
  schedule:
    - cron: '0 2 * * *'  # 2 AM UTC daily

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync cards
        run: |
          curl -X POST https://card-haus-phi.vercel.app/api/cron/sync-cards \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
